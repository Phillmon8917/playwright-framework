name: PR Branch Rules Enforcement

on:
  pull_request:
    branches:
      - "**" # Run on all PRs
    types: [opened, synchronize, reopened]

jobs:
  branch-validation:
    name: branch-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR
        uses: actions/checkout@v3

      - name: Validate PR branches
        run: |
          echo "Starting PR branch validation..."

          SOURCE_BRANCH="${{ github.event.pull_request.head.ref }}"
          DEST_BRANCH="${{ github.event.pull_request.base.ref }}"

          echo "Source: $SOURCE_BRANCH"
          echo "Destination: $DEST_BRANCH"

          fail() { echo "ERROR: $1"; exit 1; }

          # Rule 1: New branches must start with hotfix/, bugfix/, feature/
          if [[ "$SOURCE_BRANCH" != "develop" && "$SOURCE_BRANCH" != "qa" && "$SOURCE_BRANCH" != "main" ]]; then
            if [[ ! "$SOURCE_BRANCH" =~ ^(feature|bugfix|hotfix)/ ]]; then
              fail "Branch '$SOURCE_BRANCH' must start with feature/, bugfix/, or hotfix/"
            fi
          fi

          # Rule 2: PRs from new branches → develop only
          if [[ "$SOURCE_BRANCH" =~ ^(feature|bugfix|hotfix)/ ]] && [[ "$DEST_BRANCH" != "develop" ]]; then
            fail "New branches ($SOURCE_BRANCH) must create PRs to 'develop' only"
          fi

          # Rule 3: PRs from develop → qa only
          if [[ "$SOURCE_BRANCH" == "develop" ]] && [[ "$DEST_BRANCH" != "qa" ]]; then
            fail "PRs from 'develop' must target 'qa' only"
          fi

          # Rule 4: PRs from qa → main only
          if [[ "$SOURCE_BRANCH" == "qa" ]] && [[ "$DEST_BRANCH" != "main" ]]; then
            fail "PRs from 'qa' must target 'main' only"
          fi

          # Rule 5: Block PRs from main
          if [[ "$SOURCE_BRANCH" == "main" ]]; then
            fail "Direct PRs from 'main' are not allowed. Changes must come from 'qa'."
          fi

          # Rule 6: Ensure source branch is up to date with destination
          git fetch origin $DEST_BRANCH
          MERGE_BASE=$(git merge-base origin/$DEST_BRANCH HEAD)
          DEST_COMMIT=$(git rev-parse origin/$DEST_BRANCH)
          if [[ "$MERGE_BASE" != "$DEST_COMMIT" ]]; then
            fail "Branch '$SOURCE_BRANCH' is behind '$DEST_BRANCH'. Please rebase or merge latest changes before opening PR."
          fi

          echo "✅ PR branch rules ran successfully."
