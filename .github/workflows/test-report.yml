name: Generate Test Report

on:
  push:
    branches:
      - qa
      - develop
  workflow_dispatch:

jobs:
  test-report:
    runs-on: ubuntu-latest
    env: # job-level env applies to all steps
      ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      LOCAL_TEST_TIMEOUT: ${{ vars.LOCAL_TEST_TIMEOUT }}
      TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT }}
      GLOBAL_TIMEOUT: ${{ vars.GLOBAL_TIMEOUT }}
      ACTION_TIMEOUT: ${{ vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ vars.NAVIGATION_TIMEOUT }}
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run test report
        run: |
          npm run lint
          npx playwright test --reporter=html
          node scripts/style-report.js

      - name: Upload report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: playwright-report/

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: playwright-report/
