name: Generate Test Report

on:
  push:
    branches:
      - qa
      - develop
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test-report:
    runs-on: ubuntu-latest
    env:
      ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      LOCAL_TEST_TIMEOUT: ${{ vars.LOCAL_TEST_TIMEOUT }}
      TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT }}
      GLOBAL_TIMEOUT: ${{ vars.GLOBAL_TIMEOUT }}
      ACTION_TIMEOUT: ${{ vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ vars.NAVIGATION_TIMEOUT }}
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run full test report pipeline
        run: |
          npm run lint
          npx playwright test
          node scripts/style-report.js

      - name: Build monthly QA report
        run: node --loader ts-node/esm src/main/report/build-report.ts

      # ── Assemble GitHub Pages output ──────────────────────────────────────
      - name: Assemble Pages directory
        if: always()
        run: |
          mkdir -p gh-pages/test-results
          mkdir -p gh-pages/monthly-report

          # Copy Playwright report
          cp -r playwright-report/. gh-pages/test-results/

          # Copy monthly QA report
          cp src/dist/report.html gh-pages/monthly-report/index.html

          # Create dashboard index
          cat > gh-pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>QA Dashboard</title>
            <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
            <style>
              :root {
                --bg: #0b0d12;
                --surface: #111318;
                --border: #1f2330;
                --accent: #4fffb0;
                --accent2: #7b6fff;
                --text: #e8eaf0;
                --text-muted: #6b7080;
              }
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
              body {
                background: var(--bg);
                color: var(--text);
                font-family: 'DM Sans', sans-serif;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 48px 24px;
              }
              .badge {
                font-family: 'DM Mono', monospace;
                font-size: 11px;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: var(--accent);
                background: rgba(79,255,176,0.08);
                border: 1px solid rgba(79,255,176,0.2);
                padding: 4px 14px;
                border-radius: 2px;
                margin-bottom: 24px;
              }
              h1 {
                font-family: 'Syne', sans-serif;
                font-size: clamp(32px, 6vw, 56px);
                font-weight: 800;
                letter-spacing: -0.03em;
                text-align: center;
                margin-bottom: 12px;
              }
              h1 span { color: var(--accent); }
              .subtitle {
                color: var(--text-muted);
                font-size: 15px;
                text-align: center;
                margin-bottom: 56px;
              }
              .cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 24px;
                width: 100%;
                max-width: 720px;
              }
              .card {
                background: var(--surface);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 32px 28px;
                text-decoration: none;
                color: inherit;
                transition: transform 0.2s, border-color 0.2s;
                position: relative;
                overflow: hidden;
              }
              .card::before {
                content: '';
                position: absolute;
                top: 0; left: 0; right: 0;
                height: 3px;
              }
              .card.results::before { background: var(--accent2); }
              .card.monthly::before { background: var(--accent); }
              .card:hover { transform: translateY(-4px); border-color: #3a3f50; }
              .card-icon { font-size: 32px; margin-bottom: 16px; }
              .card-title {
                font-family: 'Syne', sans-serif;
                font-size: 20px;
                font-weight: 700;
                margin-bottom: 8px;
              }
              .card-desc {
                font-size: 13px;
                color: var(--text-muted);
                line-height: 1.6;
                margin-bottom: 24px;
              }
              .card-link {
                font-family: 'DM Mono', monospace;
                font-size: 11px;
                letter-spacing: 0.1em;
                text-transform: uppercase;
              }
              .card.results .card-link { color: var(--accent2); }
              .card.monthly .card-link { color: var(--accent); }
              .footer {
                margin-top: 56px;
                font-family: 'DM Mono', monospace;
                font-size: 11px;
                color: var(--text-muted);
                text-align: center;
                line-height: 1.8;
              }
              .footer span { color: var(--accent); }
            </style>
          </head>
          <body>
            <div class="badge">QA Automation · PHPTRAVELS</div>
            <h1>Test <span>Dashboard</span></h1>
            <p class="subtitle">All QA reports in one place. Pick a report to view.</p>

            <div class="cards">
              <a href="./test-results/index.html" class="card results">
                <div class="card-icon">🧪</div>
                <div class="card-title">Test Results</div>
                <div class="card-desc">
                  Latest Playwright run — pass/fail breakdown, test details,
                  traces, screenshots and video recordings.
                </div>
                <div class="card-link">View results →</div>
              </a>

              <a href="./monthly-report/index.html" class="card monthly">
                <div class="card-icon">📊</div>
                <div class="card-title">Monthly QA Report</div>
                <div class="card-desc">
                  Trends, pass rates, run history and insights across the
                  full month. Designed by Phillimon Motsinoni.
                </div>
                <div class="card-link">View report →</div>
              </a>
            </div>

            <div class="footer">
              Generated ${{ env.REPORT_DATE }} &nbsp;·&nbsp; Branch: <span>${{ env.GITHUB_REF_NAME }}</span>
            </div>
          </body>
          </html>
          HTML

      - name: Set report date env
        if: always()
        run: echo "REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: playwright-report/

      - name: Upload monthly report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-report
          path: src/dist/report.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages/
          keep_files: false
