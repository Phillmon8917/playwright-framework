name: Generate Test Report

on:
  push:
    branches:
      - qa
      - develop
  workflow_dispatch:
  schedule:
    # 06:00 UTC = 08:00 SAST (South Africa Standard Time)
    - cron: "0 6 * * *"

jobs:
  test-report:
    runs-on: ubuntu-latest
    env:
      ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
      USERNAME: ${{ secrets.USERNAME }}
      PASSWORD: ${{ secrets.PASSWORD }}
      LOCAL_TEST_TIMEOUT: ${{ vars.LOCAL_TEST_TIMEOUT }}
      TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT }}
      GLOBAL_TIMEOUT: ${{ vars.GLOBAL_TIMEOUT }}
      ACTION_TIMEOUT: ${{ vars.ACTION_TIMEOUT }}
      NAVIGATION_TIMEOUT: ${{ vars.NAVIGATION_TIMEOUT }}
      BASE_URL: ${{ vars.BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run lint
        run: npm run lint

      - name: Run Playwright tests
        run: npx playwright test

      - name: Style Playwright HTML report
        run: node scripts/style-report.js

      - name: Build monthly QA report
        run: node --loader ts-node/esm src/main/report/build-report.ts

      - name: Assemble Pages directory
        if: always()
        run: |
          mkdir -p gh-pages/test-results
          mkdir -p gh-pages/monthly-report

          # Copy Playwright report
          cp -r playwright-report/. gh-pages/test-results/

          # Copy monthly QA report
          cp src/dist/report.html gh-pages/monthly-report/index.html

          # Create dashboard index
          cat > gh-pages/index.html << 'HTML'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>QA Dashboard</title>
            <!-- styles omitted for brevity -->
          </head>
          <body>
            <div class="badge">QA Automation · PHPTRAVELS</div>
            <h1>Test <span>Dashboard</span></h1>
            <p class="subtitle">All QA reports in one place. Pick a report to view.</p>

            <div class="cards">
              <a href="./test-results/index.html" class="card results">
                <div class="card-icon">🧪</div>
                <div class="card-title">Test Results</div>
                <div class="card-desc">
                  Latest Playwright run — pass/fail breakdown, test details,
                  traces, screenshots and video recordings.
                </div>
                <div class="card-link">View results →</div>
              </a>

              <a href="./monthly-report/index.html" class="card monthly">
                <div class="card-icon">📊</div>
                <div class="card-title">Monthly QA Report</div>
                <div class="card-desc">
                  Trends, pass rates, run history and insights across the
                  full month. Designed by Phillimon Motsinoni.
                </div>
                <div class="card-link">View report →</div>
              </a>
            </div>

            <div class="footer">
              Generated ${{ env.REPORT_DATE }} &nbsp;·&nbsp; Branch: <span>${{ env.GITHUB_REF_NAME }}</span>
            </div>
          </body>
          </html>
          HTML

      - name: Set report date env
        if: always()
        run: echo "REPORT_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_ENV

      - name: Upload test results artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: playwright-report/

      - name: Upload monthly report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: monthly-report
          path: src/dist/report.html

      - name: Deploy to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages/
          keep_files: false
