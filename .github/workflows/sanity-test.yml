name: Sanity Tests

permissions:
    contents: write
    actions: write
    pages: write
    id-token: write

on:
    schedule:
        - cron: "0 8 * * *"
        - cron: "0 13 * * *"
    push:
        branches:
            - "**"
    workflow_dispatch:

jobs:
    sanity:
        runs-on: ubuntu-latest
        env:
            ZEROSTEP_TOKEN: ${{ secrets.ZEROSTEP_TOKEN }}
            ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
            ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
            CUSTOMER_USERNAME: ${{ secrets.CUSTOMER_USERNAME }}
            CUSTOMER_PASSWORD: ${{ secrets.CUSTOMER_PASSWORD }}
            AGENT_USERNAME: ${{ secrets.AGENT_USERNAME }}
            AGENT_PASSWORD: ${{ secrets.AGENT_PASSWORD }}
            GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
            LOCAL_TEST_TIMEOUT: ${{ vars.LOCAL_TEST_TIMEOUT }}
            TEST_TIMEOUT: ${{ vars.TEST_TIMEOUT }}
            GLOBAL_TIMEOUT: ${{ vars.GLOBAL_TIMEOUT }}
            ACTION_TIMEOUT: ${{ vars.ACTION_TIMEOUT }}
            NAVIGATION_TIMEOUT: ${{ vars.NAVIGATION_TIMEOUT }}
            BASE_URL: ${{ vars.BASE_URL }}

        steps:
            - name: Checkout test repo
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "20"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps

            - name: Run sanity tests
              run: npx playwright test --grep @sanity --reporter=html

            - name: Upload sanity report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: sanity-report
                  path: playwright-report/
                  retention-days: 7
